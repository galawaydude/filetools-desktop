name: Build Windows installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check C compiler (required by Fyne/cgo)
        shell: pwsh
        run: |
          if (-not (Get-Command gcc -ErrorAction SilentlyContinue)) {
            choco install mingw -y
            echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          gcc --version

      - name: Run tests
        shell: pwsh
        env:
          CGO_ENABLED: "1"
        run: go test ./...

      - name: Install Fyne packaging tool
        shell: pwsh
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          echo "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Package Windows executable
        shell: pwsh
        env:
          CGO_ENABLED: "1"
        run: |
          # Build a GUI binary (no console window), then wrap it with icon + metadata.
          go build -ldflags "-H windowsgui" -o build/FileTools-raw.exe ./cmd/filetools
          fyne package --os windows --executable build/FileTools-raw.exe --name FileTools --icon build/appicon.png --release
          if (-not (Test-Path "FileTools.exe")) { throw "FileTools.exe was not produced" }

      - name: Build installer with NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          & "C:\Program Files (x86)\NSIS\makensis.exe" build\installer.nsi
          if (-not (Test-Path "build\FileToolsSetup.exe")) { throw "installer was not produced" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileToolsSetup
          path: build/FileToolsSetup.exe

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/FileToolsSetup.exe
          generate_release_notes: true
