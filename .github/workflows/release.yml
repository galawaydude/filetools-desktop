name: Build installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check C compiler (required by Fyne/cgo)
        shell: pwsh
        run: |
          if (-not (Get-Command gcc -ErrorAction SilentlyContinue)) {
            choco install mingw -y
            echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          gcc --version

      - name: Run tests
        shell: pwsh
        env:
          CGO_ENABLED: "1"
        run: go test ./...

      - name: Install Fyne packaging tool
        shell: pwsh
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          echo "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Package Windows executable
        shell: pwsh
        env:
          CGO_ENABLED: "1"
        run: |
          # fyne builds the command package for Windows (GUI subsystem, no console
          # window) and embeds the icon. --icon is resolved relative to --src, so
          # pass an absolute path. Output FileTools.exe lands in the repo root.
          $icon = Join-Path (Get-Location) "build\appicon.png"
          fyne package --os windows --src ./cmd/filetools --icon "$icon" --name FileTools --app-id ai.filetools.desktop --release
          Write-Host "=== .exe files after packaging ==="
          Get-ChildItem -Recurse -Filter *.exe | ForEach-Object { Write-Host $_.FullName }
          $exe = Get-ChildItem -Recurse -Filter FileTools.exe | Select-Object -First 1
          if (-not $exe) { throw "FileTools.exe was not produced" }
          $dest = Join-Path (Get-Location) "FileTools.exe"
          if ($exe.FullName -ne $dest) { Move-Item -Force $exe.FullName $dest }
          Write-Host "Using installer input: $dest"

      - name: Build installer with NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          & "C:\Program Files (x86)\NSIS\makensis.exe" build\installer.nsi
          if (-not (Test-Path "build\FileToolsSetup.exe")) { throw "installer was not produced" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileToolsSetup
          path: build/FileToolsSetup.exe

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/FileToolsSetup.exe
          generate_release_notes: true

  macos-installer:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        env:
          CGO_ENABLED: "1"
        run: go test ./...

      - name: Install Fyne packaging tool
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build universal binary (Intel + Apple Silicon)
        env:
          CGO_ENABLED: "1"
        run: |
          GOARCH=arm64 go build -o ft-arm64 ./cmd/filetools
          GOARCH=amd64 CC="clang -arch x86_64" go build -o ft-amd64 ./cmd/filetools
          lipo -create -output ft-universal ft-arm64 ft-amd64
          lipo -info ft-universal

      - name: Package .app and build DMG
        run: |
          fyne package --os darwin --executable ft-universal --name FileTools --icon build/appicon.png --app-id ai.filetools.desktop --release
          test -d FileTools.app || { echo "FileTools.app was not produced"; exit 1; }
          mkdir -p dmg/root
          cp -R FileTools.app dmg/root/
          ln -s /Applications dmg/root/Applications
          hdiutil create -volname "File Tools" -srcfolder dmg/root -ov -format UDZO FileTools.dmg
          test -f FileTools.dmg || { echo "DMG was not produced"; exit 1; }

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileTools-dmg
          path: FileTools.dmg

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FileTools.dmg
          generate_release_notes: true
